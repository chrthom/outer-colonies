name: Format, Lint and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  format-lint-test:
    name: Format, Lint and Test
    if: "!contains(github.event.head_commit.message, 'chore: auto-format')"
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        project: [client, server, website]
      fail-fast: false  # Continue even if one project fails
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      working-directory: ./${{ matrix.project }}
      run: npm install

    - name: Run format with auto-fix
      working-directory: ./${{ matrix.project }}
      run: npm run format
      continue-on-error: false

    - name: Check for format changes
      id: format-changes
      working-directory: ./${{ matrix.project }}
      run: |
        git diff --exit-code || echo "changes_detected=true" >> $GITHUB_OUTPUT

    - name: Commit format changes if any
      if: steps.format-changes.outputs.changes_detected == 'true'
      working-directory: ./${{ matrix.project }}
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add .
        git commit -m "chore: auto-format ${{ matrix.project }}"
        git pull --rebase origin ${{ github.head_ref || github.ref_name }}
        git push https://x-access-token:${{ secrets.PERSONAL_ACCESS_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.head_ref || github.ref_name }}

    - name: Run lint
      working-directory: ./${{ matrix.project }}
      run: npm run lint
      continue-on-error: false

    - name: Run tests
      if: success()  # Only run tests if lint passed
      working-directory: ./${{ matrix.project }}
      run: npm run test