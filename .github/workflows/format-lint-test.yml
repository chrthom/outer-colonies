name: Format, Lint and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      client-changed: ${{ steps.detect.outputs.client-changed }}
      server-changed: ${{ steps.detect.outputs.server-changed }}
      website-changed: ${{ steps.detect.outputs.website-changed }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        fetch-depth: 0  # Fetch full history for proper git operations

    - name: Detect changed files
      id: detect
      run: |
        # Get the base commit for comparison
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE_COMMIT=${{ github.event.pull_request.base.sha }}
        else
          BASE_COMMIT=${{ github.event.before }}
        fi
        
        # Check each project directory for changes
        if git diff --name-only $BASE_COMMIT HEAD | grep -q ^client/; then
          echo "client-changed=true" >> $GITHUB_OUTPUT
        else
          echo "client-changed=false" >> $GITHUB_OUTPUT
        fi
        
        if git diff --name-only $BASE_COMMIT HEAD | grep -q ^server/; then
          echo "server-changed=true" >> $GITHUB_OUTPUT
        else
          echo "server-changed=false" >> $GITHUB_OUTPUT
        fi
        
        if git diff --name-only $BASE_COMMIT HEAD | grep -q ^website/; then
          echo "website-changed=true" >> $GITHUB_OUTPUT
        else
          echo "website-changed=false" >> $GITHUB_OUTPUT
        fi

  format-lint-test:
    name: Format, Lint and Test
    runs-on: ubuntu-latest
    needs: detect-changes
    
    strategy:
      matrix:
        project: [client, server, website]
      fail-fast: false  # Continue even if one project fails
    
    # Only run this job if files in the specific project directory were changed
    if: >-
      (matrix.project == 'client' && needs.detect-changes.outputs.client-changed == 'true') ||
      (matrix.project == 'server' && needs.detect-changes.outputs.server-changed == 'true') ||
      (matrix.project == 'website' && needs.detect-changes.outputs.website-changed == 'true')
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        fetch-depth: 0  # Fetch full history for proper git operations

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      working-directory: ./${{ matrix.project }}
      run: npm install

    - name: Run format with auto-fix
      working-directory: ./${{ matrix.project }}
      run: npm run format
      continue-on-error: false

    - name: Check for format changes
      id: format-changes
      working-directory: ./${{ matrix.project }}
      run: |
        git diff --exit-code || echo "changes_detected=true" >> $GITHUB_OUTPUT

    - name: Commit format changes if any
      if: steps.format-changes.outputs.changes_detected == 'true'
      run: |
        # Store current branch name
        BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
        
        # Navigate to project directory and stage changes
        cd ./${{ matrix.project }}
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add .
        
        # Go back to root for git operations
        cd ..
        git commit -m "chore: auto-format ${{ matrix.project }}"
        git fetch origin "$BRANCH_NAME"
        git checkout "$BRANCH_NAME"
        git pull origin "$BRANCH_NAME"
        git push https://x-access-token:${{ secrets.PERSONAL_ACCESS_TOKEN }}@github.com/${{ github.repository }}.git "$BRANCH_NAME"

    - name: Run lint
      working-directory: ./${{ matrix.project }}
      run: npm run lint
      continue-on-error: false

    - name: Run tests
      if: success()  # Only run tests if lint passed
      working-directory: ./${{ matrix.project }}
      run: npm run test