enabled_skills = [
    "github-workflow",
]
installed_agents = [
    "lean",
]

[git]
main_branch = "main"
conventional_commits = true
commit_types = [
    "feat",
    "fix",
    "chore",
    "docs",
    "style",
    "refactor",
    "test",
]

[mcp_servers]
gitmcp = { type = "http", url = "https://gitmcp.io/chrthom/outer-colonies", name = "GitMCP" }

[github]
repository = "https://github.com/chrthom/outer-colonies"
use_issues = true
manage_subtasks = true

[project]
subprojects = [
    "client/",
    "server/",
    "website/",
]
readme_path = "README.md"

[documentation]
update_readme = true
check_on_code_changes = true

[pre_commit]
run_format = true
run_lint = true
fix_lint_issues = true
run_tests = true
fix_test_failures = true
