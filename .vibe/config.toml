# Mistral Vibe Configuration for Outer Colonies

[git]
main_branch = "main"
conventional_commits = true
commit_types = ["feat", "fix", "chore", "docs", "style", "refactor", "test"]

[github]
repository = "https://github.com/chrthom/outer-colonies"
use_issues = true
manage_subtasks = true

[skills.github_workflow]
enabled = true
auto_branch_creation = true
auto_commit_push = true
auto_pr_creation = true
auto_issue_update = true
default_commit_type = "feat"

[project]
subprojects = ["client/", "server/", "website/"]
readme_path = "README.md"

[documentation]
update_readme = true
check_on_code_changes = true

[pre_commit]
run_format = true
run_lint = true
fix_lint_issues = true
run_tests = true
fix_test_failures = true
